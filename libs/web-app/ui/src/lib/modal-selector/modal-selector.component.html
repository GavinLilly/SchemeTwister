<h2 mat-dialog-title>Select a {{ itemType }}</h2>
<mat-dialog-content>
  <mat-form-field appearance="fill" class="full-width">
    <mat-label>Selection</mat-label>
    <mat-select
      [(ngModel)]="selectedItem"
      [ngModelOptions]="{ standalone: true }"
      (selectionChange)="onSelectionChange($event)"
    >
      <mat-option [value]="randomText">{{ randomText }}</mat-option>
      <mat-option *ngFor="let item of adjustedAvailableItems" [value]="item.id">
        {{ item.name }}
      </mat-option>
    </mat-select>
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Close</button>
</mat-dialog-actions>
