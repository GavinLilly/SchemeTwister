<h2 mat-dialog-title>Select heroes to use in the setup</h2>
<mat-dialog-content>
  <ng-container *ngFor="let num of numHeroesArray; let i = index">
    <mat-form-field
      appearance="fill"
      class="full-width"
      *ngIf="!isDisabled(i)"
    >
      <mat-label>Hero {{ i + 1 }}</mat-label>
      <mat-select
        [(ngModel)]="selectedHeroIds[i]"
        [ngModelOptions]="{ standalone: true }"
        (selectionChange)="setChosenHero(i, $event.value)"
      >
        <mat-option [value]="randomText">{{ randomText }}</mat-option>
        <mat-option
          *ngFor="let item of getAvailableHeroes(i)"
          [value]="item.id"
        >
          {{ item.name }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </ng-container>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Close</button>
  <button mat-flat-button color="primary" (click)="emitHeroes()">
    Confirm
  </button>
</mat-dialog-actions>
