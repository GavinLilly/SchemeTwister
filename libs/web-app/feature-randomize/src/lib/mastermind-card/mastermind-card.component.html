<div class="card">
  <div class="card-header d-flex align-items-center justify-content-between">
    Mastermind
    <button mat-icon-button type="button" aria-label="Pick mastermind" (click)="pickMastermind()">
      <fa-icon [icon]="faCog" class="ml-auto"></fa-icon>
    </button>
  </div>
  @if (mastermind(); as mastermind) {
  <div class="card-body p-0">
    <mat-accordion>
      <mat-expansion-panel class="mastermind">
        <mat-expansion-panel-header>
          <mat-panel-title>{{ mastermind.name }}</mat-panel-title>
          <mat-panel-description>
            <button mat-icon-button type="button" (click)="toggleLocked()">
              <span [class.locked]="mastermindLocked()" [class.unlocked]="!mastermindLocked()">
                <fa-icon [icon]="mastermindLocked() ? faLock : faLockOpen"></fa-icon>
              </span>
            </button>
          </mat-panel-description>
        </mat-expansion-panel-header>
        <schemetwister-mastermind-card-content [mastermind]="mastermind"></schemetwister-mastermind-card-content>
      </mat-expansion-panel>
    </mat-accordion>
  </div>
  }
</div>
