<div class="card">
  <div class="card-header d-flex align-items-center justify-content-between">
    Scheme
    <button mat-icon-button type="button" aria-label="Pick scheme" (click)="pickScheme()">
      <fa-icon [icon]="faCog" class="ml-auto"></fa-icon>
    </button>
  </div>
  @if (scheme(); as scheme) {
  <div class="card-body p-0">
    <mat-accordion>
      <mat-expansion-panel>
        <mat-expansion-panel-header>
          <mat-panel-title>{{ scheme.name }}</mat-panel-title>
          <mat-panel-description>
            <button mat-icon-button type="button" (click)="schemeLocked() ? dispatchReset() : dispatchLocked(scheme)">
              <span [class.locked]="schemeLocked()" [class.unlocked]="!schemeLocked()">
                <fa-icon [icon]="schemeLocked() ? faLock : faLockOpen"></fa-icon>
              </span>
            </button>
          </mat-panel-description>
        </mat-expansion-panel-header>
        <div class="mat-expansion-panel-body">
          <p class="card-text"><b>Setup: </b>{{ scheme.setup }}</p>
          <p class="card-text"><b>Twist: </b>{{ scheme.twist }}</p>
          <p class="card-text"><b>Evil Wins: </b>{{ scheme.evilWins }}</p>
          <hr />
          <schemetwister-base-card-content [card]="scheme"></schemetwister-base-card-content>
        </div>
      </mat-expansion-panel>
    </mat-accordion>
  </div>
  }
</div>
